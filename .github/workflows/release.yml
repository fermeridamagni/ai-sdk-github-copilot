name: Publish Package

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use Bun as the runtime and package manager, as required by project rules
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Strip the leading "v" from the git tag (e.g. "v1.2.3" → "1.2.3").
      # Fail fast if the result is not a valid semver string (MAJOR.MINOR.PATCH)
      # so we don't waste time building a package that npm will reject.
      - name: Extract and validate version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not produce a valid semver version: '${VERSION}'. Use a tag like v1.2.3."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Patch package.json version in-place using a Bun inline script.
      # We pass the version via an environment variable to avoid shell-quoting issues.
      - name: Update package.json version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          bun -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = process.env.VERSION;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: bun install

      - name: Build package
        run: bun run build

      # Write the npm auth token directly into ~/.npmrc.
      # This is the most reliable way to pass credentials to bun publish —
      # NPM_CONFIG_TOKEN is documented but not always honoured in practice,
      # while the .npmrc entry is the canonical npm authentication mechanism.
      - name: Configure npm authentication
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc

      - name: Publish to npm
        run: bun publish --access public
